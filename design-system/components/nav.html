<!-- @dsCard group="Components" name="Site nav" subtitle="Header with lockup, links, download CTA — light & dark" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Berthly — Nav</title>
<style>
  * { margin:0; box-sizing:border-box; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Inter,sans-serif;
    color:#0E1B2C; background:#EFF5FE; padding:24px;
  }
  .frame { border-radius:12px; overflow:hidden; border:1px solid #D9E6F9; }
  .frame + .frame { margin-top:20px; }
  nav {
    display:flex; align-items:center; gap:28px; padding:0 28px; height:64px;
    background:rgba(255,255,255,.85); backdrop-filter:blur(12px);
    border-bottom:1px solid #E4EDFB;
  }
  .lockup { display:flex; align-items:center; gap:9px; margin-right:8px; text-decoration:none; }
  .lockup b { font-size:17px; font-weight:700; letter-spacing:-.01em; color:#0E1B2C; }
  .links { display:flex; gap:24px; flex:1; }
  .links a { font-size:14.5px; font-weight:500; color:#51637C; text-decoration:none; }
  .links a:hover, .links a.active { color:#2A6FDB; }
  .btn {
    font-size:14px; font-weight:600; color:#fff; text-decoration:none;
    background:linear-gradient(180deg,#3F82EC,#2A6FDB); border-radius:9px; padding:8px 16px;
    box-shadow:0 1px 2px rgba(35,97,199,.3);
  }
  .toggle { width:30px; height:30px; border-radius:8px; border:1px solid #D9E6F9; background:#fff;
            display:flex; align-items:center; justify-content:center; color:#51637C; }
  nav.dark { background:rgba(11,21,38,.85); border-bottom-color:#1D2E4A; }
  nav.dark .lockup b { color:#E8F0FB; }
  nav.dark .links a { color:#9DB2CE; }
  nav.dark .links a.active { color:#8FB6F0; }
  nav.dark .toggle { background:#0F1B30; border-color:#2E4368; color:#9DB2CE; }
  .page { height:56px; }
  .page.light { background:linear-gradient(180deg,#fff,#EFF5FE); }
  .page.dark { background:linear-gradient(180deg,#0B1526,#0F1B30); }
</style>
</head>
<body>
  <div class="frame">
    <nav>
      <a class="lockup" href="#">
        <svg width="26" height="26" viewBox="0 0 512 512"><defs><linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3F82EC"/><stop offset="1" stop-color="#2361C7"/></linearGradient><clipPath id="r1"><rect width="512" height="512" rx="116"/></clipPath></defs><g clip-path="url(#r1)"><rect width="512" height="512" fill="url(#g1)"/><rect x="-40" y="380" width="592" height="184" fill="#B9D4FB"/><rect x="150" y="104" width="212" height="76" rx="38" fill="#FFF"/><rect x="190" y="160" width="132" height="236" fill="#FFF"/><rect x="140" y="346" width="232" height="58" rx="16" fill="#FFF"/><path d="M162 246 Q256 298 350 246" stroke="#8FB6F0" stroke-width="44" stroke-linecap="round" fill="none"/></g></svg>
        <b>Berthly</b>
      </a>
      <span class="links">
        <a href="#" class="active">Features</a>
        <a href="#">Blog</a>
        <a href="#">GitHub</a>
      </span>
      <span class="toggle"><svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor"><path d="M8 3.5A4.5 4.5 0 1 0 12.5 8 4.5 4.5 0 0 0 8 3.5zM8 0h.5v2H7.5V0zM8 14h.5v2H7.5v-2zM0 7.5h2v1H0zM14 7.5h2v1h-2zM2.6 1.9l1.4 1.4-.7.7L1.9 2.6zM12 12.7l1.4 1.4-.7.7-1.4-1.4zM12.7 3.3l1.4-1.4.7.7-1.4 1.4zM1.9 13.4l1.4-1.4.7.7-1.4 1.4z"/></svg></span>
      <a class="btn" href="#">Download</a>
    </nav>
    <div class="page light"></div>
  </div>

  <div class="frame" style="border-color:#1D2E4A">
    <nav class="dark">
      <a class="lockup" href="#">
        <svg width="26" height="26" viewBox="0 0 512 512"><defs><linearGradient id="g2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3F82EC"/><stop offset="1" stop-color="#2361C7"/></linearGradient><clipPath id="r2"><rect width="512" height="512" rx="116"/></clipPath></defs><g clip-path="url(#r2)"><rect width="512" height="512" fill="url(#g2)"/><rect x="-40" y="380" width="592" height="184" fill="#B9D4FB"/><rect x="150" y="104" width="212" height="76" rx="38" fill="#FFF"/><rect x="190" y="160" width="132" height="236" fill="#FFF"/><rect x="140" y="346" width="232" height="58" rx="16" fill="#FFF"/><path d="M162 246 Q256 298 350 246" stroke="#8FB6F0" stroke-width="44" stroke-linecap="round" fill="none"/></g></svg>
        <b>Berthly</b>
      </a>
      <span class="links">
        <a href="#" class="active">Features</a>
        <a href="#">Blog</a>
        <a href="#">GitHub</a>
      </span>
      <span class="toggle"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M13.5 9.8A6 6 0 0 1 6.2 2.5 6 6 0 1 0 13.5 9.8z"/></svg></span>
      <a class="btn" href="#">Download</a>
    </nav>
    <div class="page dark"></div>
  </div>
</body>
</html>
