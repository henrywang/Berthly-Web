<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Berthly — Buttons</title>
<style>
  * { margin:0; box-sizing:border-box; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Inter,sans-serif;
    background:#fff; color:#0E1B2C;
  }
  .panel { padding:32px; }
  .panel.dark { background:#0B1526; }
  .label { font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:#51637C; margin-bottom:16px; }
  .dark .label { color:#9DB2CE; }
  .row { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .row + .row { margin-top:14px; }
  .btn {
    display:inline-flex; align-items:center; gap:8px; cursor:pointer;
    font:inherit; font-size:15px; font-weight:600; letter-spacing:-.005em;
    border-radius:10px; padding:11px 20px; border:1px solid transparent; text-decoration:none;
  }
  .btn.lg { font-size:16px; padding:14px 26px; border-radius:12px; }
  .btn svg { flex:none; }

  .primary { background:linear-gradient(180deg,#3F82EC,#2A6FDB); color:#fff;
             box-shadow:0 1px 2px rgba(35,97,199,.35), inset 0 1px 0 rgba(255,255,255,.18); }
  .primary:hover { background:linear-gradient(180deg,#4E8DEF,#3578E3); }
  .secondary { background:#fff; color:#2A6FDB; border-color:#B9D4FB; }
  .secondary:hover { background:#EFF5FE; }
  .ghost { background:transparent; color:#51637C; }
  .ghost:hover { color:#2A6FDB; background:#EFF5FE; }

  .dark .secondary { background:rgba(143,182,240,.08); color:#B9D4FB; border-color:#2E4368; }
  .dark .secondary:hover { background:rgba(143,182,240,.14); }
  .dark .ghost { color:#9DB2CE; }
  .dark .ghost:hover { color:#B9D4FB; background:rgba(143,182,240,.08); }
</style>
</head>
<body>
  <div class="panel">
    <div class="label">Light</div>
    <div class="row">
      <a class="btn lg primary" href="#">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1v8.6L4.7 6.3 3.3 7.7 8 12.4l4.7-4.7-1.4-1.4L8 9.6V1zM2 13h12v2H2z"/></svg>
        Download for macOS
      </a>
      <a class="btn lg secondary" href="#">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 .5a7.5 7.5 0 0 0-2.37 14.62c.37.07.51-.16.51-.36v-1.26c-2.09.45-2.53-1-2.53-1-.34-.87-.83-1.1-.83-1.1-.68-.46.05-.45.05-.45.75.05 1.15.77 1.15.77.67 1.14 1.75.81 2.18.62.07-.48.26-.81.47-1-1.67-.19-3.42-.83-3.42-3.7 0-.82.29-1.49.77-2.02-.08-.19-.33-.95.07-1.98 0 0 .63-.2 2.06.77a7.2 7.2 0 0 1 3.76 0c1.43-.97 2.06-.77 2.06-.77.4 1.03.15 1.79.07 1.98.48.53.77 1.2.77 2.02 0 2.88-1.76 3.51-3.43 3.7.27.23.5.68.5 1.38v2.04c0 .2.14.44.52.36A7.5 7.5 0 0 0 8 .5z"/></svg>
        View on GitHub
      </a>
      <a class="btn ghost" href="#">Read the blog →</a>
    </div>
    <div class="row">
      <a class="btn primary" href="#">Download</a>
      <a class="btn secondary" href="#">Release notes</a>
    </div>
  </div>
  <div class="panel dark">
    <div class="label">Dark</div>
    <div class="row">
      <a class="btn lg primary" href="#">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1v8.6L4.7 6.3 3.3 7.7 8 12.4l4.7-4.7-1.4-1.4L8 9.6V1zM2 13h12v2H2z"/></svg>
        Download for macOS
      </a>
      <a class="btn lg secondary" href="#">View on GitHub</a>
      <a class="btn ghost" href="#">Read the blog →</a>
    </div>
  </div>
</body>
</html>
